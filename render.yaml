# ═══════════════════════════════════════════════════════════════════════════════
# render.yaml — Render Blueprint
# One-click deployment of StreamtoExcel - LSEGMSGFEED to Render.com
#
# Usage:
#   1. Fork this repo to your GitHub account
#   2. Add your LSEG JAR files to a private, URL-accessible location
#      (e.g. a private S3 bucket with a pre-signed URL, or Google Drive direct link)
#   3. Click the "Deploy to Render" button in the README
#   4. Fill in the required environment variables when prompted
# ═══════════════════════════════════════════════════════════════════════════════

services:
  - type: web
    name: umfstreamtoexcel
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free          # change to "starter" ($7/mo) for always-on uptime

    envVars:
      # ── Required ─────────────────────────────────────────────────────────────

      - key: PORT
        value: 3001

      # JWT signing secret — auto-generated by Render (cryptographically random)
      - key: JWT_SECRET
        generateValue: true

      # Initial admin password — set this to something strong
      - key: ADMIN_PASSWORD
        sync: false   # Render prompts the user to enter this during deployment

      # ── LSEG JARs — download URLs (required) ────────────────────────────────
      # Host your LSEG JAR files at a privately accessible HTTPS URL and paste
      # the link here. Options:
      #   • AWS S3 pre-signed URL (expires, so regenerate when deploying)
      #   • Google Cloud Storage signed URL
      #   • Azure Blob SAS URL
      #   • Any direct HTTPS link (Dropbox: change ?dl=0 to ?dl=1)

      # Production JAR  (used for env = prod, qa, trd, dev)
      - key: MSG_FEED_JAR_URL_PROD
        sync: false   # e.g. https://s3.amazonaws.com/my-bucket/message-feed-0.0.42.0.jar?...

      # PPE / Beta JAR  (used for env = beta)
      # Leave blank if you only use production.
      - key: MSG_FEED_JAR_URL_PPE
        sync: false   # e.g. https://s3.amazonaws.com/my-bucket/message-feed-ppe-0.0.41.0.jar?...

      # ── Optional ─────────────────────────────────────────────────────────────

      # Custom LSEG truststore (only needed if SSL handshake fails).
      # Leave blank to use Java's built-in certificate store (usually works fine
      # on cloud servers where there is no AV SSL inspection).
      - key: TRUST_STORE_URL
        sync: false

      # CORS — set to your Render service URL once deployed
      # Render injects the service URL as RENDER_EXTERNAL_URL automatically.
      - key: FRONTEND_ORIGIN
        fromService:
          name: umfstreamtoexcel
          type: web
          property: host

      - key: MAX_MESSAGES
        value: "500"

      - key: JAVA_BIN
        value: java

    healthCheckPath: /api/health
    autoDeploy: true
